name: CI

on:
  push:
    branches:
      - dev
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build (debug)
        run: swift build

      - name: Build (release)
        run: swift build -c release

      - name: Run tests
        run: swift test
